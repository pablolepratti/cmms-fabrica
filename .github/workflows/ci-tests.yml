name: CI Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r cmms_fabrica/requirements-dev.txt

      - name: Run tests
        run: PYTHONPATH=cmms_fabrica pytest -q
